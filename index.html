<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Für dich</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeef5);
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .popup {
      background: white;
      padding: 35px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 400px;
      position: relative;
      z-index: 2;
      animation: aufspringen 0.8s ease;
    }

    .popup h1 {
      margin: 0 0 15px 0;
      font-size: 32px;
      color: #e91e63;
    }

    .popup p {
      font-size: 22px;
      color: #444;
      margin: 0;
    }

    .herz {
      position: absolute;
      color: #ff4d88;
      font-size: 24px;
      animation: fliegen 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes aufspringen {
      0% {
        transform: scale(0.4);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes fliegen {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      20% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-120px) scale(1.2);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="popup">
    <h1>❤️</h1>
    <p>Ich liebe Dich</p>
  </div>

  <script>
    function herzErzeugen() {
      const herz = document.createElement("div");
      herz.className = "herz";
      herz.innerHTML = "❤";
      herz.style.left = Math.random() * 100 + "vw";
      herz.style.animationDuration = (4 + Math.random() * 3) + "s";
      herz.style.fontSize = (18 + Math.random() * 25) + "px";
      document.body.appendChild(herz);

      setTimeout(() => {
        herz.remove();
      }, 7000);
    }

    setInterval(herzErzeugen, 400);
  </script>

</body>
</html>
